<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>
    <style>
        /* === RESET & BASE STYLE === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Warna kuning cerah khas Neo-Brutalism */
            background-color: #fef9ec; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* === CONTAINER UTAMA === */
        .container {
            background-color: #1e3a8a;
            border: 4px solid #000000;
            box-shadow: 12px 12px 0px #000000; /* Shadow kotak solid */
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        /* === KOTAK ANGKA 404 === */
        .error-code {
            display: inline-block;
            background-color: #FF4949; /* Aksen merah */
            color: #FFFFFF;
            font-size: 5rem;
            font-weight: 900;
            border: 4px solid #000000;
            box-shadow: 6px 6px 0px #000000;
            padding: 10px 40px;
            margin-bottom: 30px;
            transform: rotate(-3deg); /* Efek miring sedikit */
        }

        /* === TIPOGRAFI === */
        h1 {
            font-size: 2rem;
            color: #fef9ec;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.1rem;
            color: #fef9ec;
            margin-bottom: 40px;
            line-height: 1.6;
            font-weight: 600;
        }

        /* === TOMBOL KEMBALI === */
        .btn {
            display: inline-block;
            background-color: #fef9ec; 
            color: #1e3a8a;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            border: 4px solid #000000;
            box-shadow: 6px 6px 0px #000000;
            padding: 15px 30px;
            transition: all 0.15s ease-in-out;
            cursor: pointer;
        }

        /* Efek saat tombol di-hover */
        .btn:hover {
            color: #fef9ec;
            background-color: rgb(24, 52, 113);
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px #000000;
        }

        /* Efek saat tombol diklik (ditekan) */
        .btn:active {
            transform: translate(6px, 6px);
            box-shadow: 0px 0px 0px #000000;
        }

        /* === RESPONSIVE UNTUK HP === */
        @media (max-width: 480px) {
            .error-code {
                font-size: 3.5rem;
                padding: 10px 20px;
            }
            h1 {
                font-size: 1.5rem;
            }
            p {
                font-size: 1rem;
            }
            .container {
                padding: 25px 20px;
                box-shadow: 8px 8px 0px #000000;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="error-code">404</div>
        <h1>Waduh, Kesasar!</h1>
        <p>Halaman yang kamu cari nggak ada di direktori. Mungkin URL-nya salah ketik, atau file HTML-nya belum diunggah.</p>
        
        <!-- Pastikan href ini mengarah ke file beranda portofolio kamu -->
        <a href="/" class="btn">Balik ke Beranda</a>
    </div>

</body>
</html>
